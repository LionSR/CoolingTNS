# TeXRA code review on every pull request, with a repository-specific prompt.
name: TeXRA Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "**/*.jl"
      - "Project.toml"
      - "Manifest.toml"
      - "CondaPkg.toml"
      - "Notes/**/*.tex"
      - "Notes/**/*.bib"
      - "slides/**/*.tex"
      - ".github/workflows/*.yml"
      - ".github/prompts/*.md"

concurrency:
  group: texra-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Repository variable kill switch: TEXRA_REVIEW_ENABLED=false disables it.
    if: ${{ vars.TEXRA_REVIEW_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check pull request is still open
        id: pr-state
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const skip = pull.state !== 'open';
            core.setOutput('skip', skip ? 'true' : 'false');
            if (skip) {
              const merged = pull.merged_at ? ' after merge' : '';
              core.notice(`Skipping TeXRA review for closed PR #${pull.number}${merged}.`);
            }

      - name: Checkout pull request
        if: steps.pr-state.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          # The merge ref + full history let the action compute merge-base..head.
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Run TeXRA review
        if: steps.pr-state.outputs.skip != 'true'
        uses: texra-ai/texra-action/review@v1
        with:
          # Repository-specific review prompt, kept in this repo.
          prompt-file: .github/prompts/texra-code-review-prompt.md
          # Optional: pin the review model via repo variable (empty auto-selects).
          model: ${{ vars.TEXRA_REVIEW_MODEL }}
          # A dedicated bot token enables thread reply / resolve / unresolve.
          github-token: ${{ secrets.TEXRA_REVIEW_GITHUB_TOKEN || github.token }}
          resolve-threads: ${{ secrets.TEXRA_REVIEW_GITHUB_TOKEN != '' }}
          # Provide one or more provider keys; the model is auto-selected.
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          deepseek-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
