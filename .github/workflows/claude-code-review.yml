name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "**/*.jl"
      - "Project.toml"
      - "Manifest.toml"
      - "CondaPkg.toml"
      - ".github/workflows/*.yml"
      - ".github/prompts/*.md"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    name: claude-review
    # Repository variable kill switch:
    #   CLAUDE_REVIEW_ENABLED=false disables Claude-powered PR review.
    #   unset or any other value preserves the default enabled behavior.
    if: vars.CLAUDE_REVIEW_ENABLED != 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
      issues: write
      id-token: write

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
      CLAUDE_OPUS_MODEL: ${{ vars.CLAUDE_OPUS_MODEL }}
      CLAUDE_SONNET_MODEL: ${{ vars.CLAUDE_SONNET_MODEL }}

    steps:
      - name: Check pull request is still open
        id: pr-state
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const skip = pull.state !== 'open';
            core.setOutput('skip', skip ? 'true' : 'false');
            if (skip) {
              const merged = pull.merged_at ? ' after merge' : '';
              core.notice(`Skipping Claude review for closed PR #${pull.number}${merged}.`);
            }

      - name: Check if head commit is a bot auto-fix
        if: steps.pr-state.outputs.skip != 'true'
        id: bot-check
        uses: actions/github-script@v8
        with:
          script: |
            // Skip review for auto-fix bot commits to avoid the
            // review -> auto-fix -> review ping-pong cascade.
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            const msg = commit.commit.message;
            const isBot = /^\[(claude|codex|texra)-(auto|review)-fix\]/.test(msg);
            core.setOutput('skip', isBot ? 'true' : 'false');
            if (isBot) core.notice(`Skipping review for bot-fix commit: ${msg.split('\n')[0]}`);

      - name: Check review provider token
        if: steps.pr-state.outputs.skip != 'true' && steps.bot-check.outputs.skip != 'true'
        id: provider-token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Claude review: CLAUDE_CODE_OAUTH_TOKEN is not configured"
          fi

      - name: Checkout repository under review
        if: steps.pr-state.outputs.skip != 'true' && steps.bot-check.outputs.skip != 'true' && steps.provider-token.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout trusted automation
        if: steps.pr-state.outputs.skip != 'true' && steps.bot-check.outputs.skip != 'true' && steps.provider-token.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: .trusted-actions
          fetch-depth: 1

      - name: Run Claude Code Review
        if: steps.pr-state.outputs.skip != 'true' && steps.bot-check.outputs.skip != 'true' && steps.provider-token.outputs.skip != 'true'
        id: claude-review
        uses: LionSR/agent-ci-actions@v1
        with:
          provider: anthropic
          model-tier: opus
          # Static review: read the repo + diff, never build (ITensors/Yao
          # precompilation is far too slow for per-PR CI; see CLAUDE.md).
          allowed_tools: >
            Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api graphql:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(grep:*),Bash(julia --version),mcp__github__*
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
          plugins: |
            code-review@claude-code-plugins
          claude-prompt-file: .trusted-actions/.github/prompts/claude-code-review-prompt.md
          claude-prompt-context: |
            PR number: ${{ github.event.pull_request.number }}
            Repository: ${{ github.repository }}
            Repository owner: ${{ github.repository_owner }}
            Repository name: ${{ github.event.repository.name }}
            Review this Julia pull request: ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            Trigger event: ${{ github.event.action }}
          system-prompt-file: .trusted-actions/.github/prompts/claude-code-review-system-prompt.md
